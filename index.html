<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="title">Каталог</div>

    <input type="text" class="search-input" placeholder="Поиск...">

    <div class="categories-title">Категории</div>

    <div class="categories-grid">
        <div class="category-card">
            <img src="images/2026-02-25 23.47.05.jpg">
            <span>Жидкости</span>
        </div>

        <div class="category-card">
            <img src="images/одноразка.jpg">
            <span>Одноразки</span>
        </div>

        <div class="category-card">
            <img src="images/под.jpg">
            <span>Поды</span>
        </div>

        <div class="category-card">
            <img src="images/картридж.jpg">
            <span>Картриджи</span>
        </div>
    </div>

    <div class="all-products">
        <div class="all-products-title">Все товары</div>

        <a href="product.html" class="product-link">
            <div class="product-card">
                <img src="images/асортимент.jpg">
                <div class="product-info">
                    <div class="product-name">ELFLIQ 30ml</div>
                    <div class="product-price">zł 50</div>
                </div>
            </div>
        </a>
    </div>

</div>

</body>
</html>
